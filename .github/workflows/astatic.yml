<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashutosh Tiwari | Premium Writer</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* PARTICLES */
#particles-js{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.hero h1{
  font-size:50px;
}

.typing{
  color:#38bdf8;
  margin-top:10px;
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  background:#38bdf8;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* GLASS */
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:20px;
  margin:20px 0;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* PORTFOLIO */
.portfolio{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.portfolio div{
  background:#0f172a;
  padding:20px;
  border-radius:10px;
}

/* FORM */
input,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#38bdf8;
  border-radius:10px;
}

/* CHATBOT */
.chatbox{
  position:fixed;
  bottom:20px;
  right:20px;
  width:250px;
  background:#0f172a;
  border-radius:10px;
  overflow:hidden;
}

.chat-header{
  background:#38bdf8;
  padding:10px;
  text-align:center;
}

.chat-body{
  height:200px;
  overflow-y:auto;
  padding:10px;
  font-size:14px;
}

.chat-input{
  display:flex;
}

.chat-input input{
  flex:1;
  border:none;
  padding:10px;
}

.chat-input button{
  width:60px;
}

footer{
  text-align:center;
  padding:20px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<!-- HERO -->
<section class="hero">
  <h1>Ashutosh Tiwari</h1>
  <div class="typing" id="typing"></div>
  <button class="btn" onclick="scrollToSection()">Hire Me</button>
</section>

<div class="container">

  <!-- ABOUT -->
  <div class="card">
    <h2>About Me</h2>
    <p>17-year-old writer creating powerful content that attracts, engages, and converts audiences.</p>
  </div>

  <!-- PORTFOLIO -->
  <div class="card">
    <h2>Portfolio</h2>
    <div class="portfolio">
      <div>Instagram Captions ✍️</div>
      <div>Ad Copy 💰</div>
      <div>Story Writing 📖</div>
      <div>Content Strategy 🔥</div>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="card" id="contact">
    <h2>Work With Me</h2>
    <form action="https://formsubmit.co/ashutiwari7744@gmail.com" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Work Details"></textarea>
      <button type="submit">Send Request</button>
    </form>
  </div>

</div>

<footer>© 2026 Ashutosh Tiwari</footer>

<!-- CHATBOT -->
<div class="chatbox">
  <div class="chat-header">Chat</div>
  <div class="chat-body" id="chatBody"></div>
  <div class="chat-input">
    <input type="text" id="chatInput">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
// typing
const texts=["Creative Writer","Content That Sells","DM for Work"];
let i=0,j=0,current="";
function type(){
  if(i<texts.length){
    if(j<texts[i].length){
      current+=texts[i][j];
      document.getElementById("typing").innerText=current;
      j++;
      setTimeout(type,100);
    }else{
      i++;j=0;current="";
      setTimeout(type,1000);
    }
  }else{i=0;type();}
}
type();

// scroll
function scrollToSection(){
  document.getElementById("contact").scrollIntoView({behavior:"smooth"});
}

// chatbot
function sendMsg(){
  let input=document.getElementById("chatInput").value;
  let body=document.getElementById("chatBody");

  body.innerHTML+="<p>You: "+input+"</p>";

  let reply="DM on Instagram for quick response!";
  if(input.toLowerCase().includes("price")) reply="Pricing depends on your work, DM me!";
  if(input.toLowerCase().includes("work")) reply="I do captions, ads, stories & more.";

  body.innerHTML+="<p>Bot: "+reply+"</p>";
}

// particles
particlesJS("particles-js",{
  particles:{number:{value:60},
  size:{value:3},
  move:{speed:2}}
});
</script>

</body>
</html>
